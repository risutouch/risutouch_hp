<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 焼き菓子.りすたっち</title>
  <meta name="description" content="焼き菓子.りすたっちへのお問い合わせ・ご注文はLINEまたはInstagramからどうぞ。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body id="contact">

  <!-- ══ Header ══ -->
  <header id="site-header" class="scrolled">
    <div class="logo">
      <img src="images/logo.png" alt="りすたっち" class="logo-img">
      <span>焼き菓子.りすたっち</span>
    </div>
    <nav id="main-nav">
      <a href="index.html">about</a>
      <a href="shops.html">販売店</a>
      <a href="contact.html" style="color:var(--caramel)">contact</a>
      <a href="https://lin.ee/75Gqk1m" class="nav-cta" target="_blank" rel="noopener">LINE で注文</a>
    </nav>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="mobile-overlay" id="mobile-overlay" onclick="closeMenu()"></div>
  <div class="mobile-nav" id="mobile-nav">
    <a href="index.html" onclick="closeMenu()">about</a>
    <a href="shops.html" onclick="closeMenu()">販売店</a>
    <a href="contact.html" onclick="closeMenu()">contact</a>
    <a href="https://lin.ee/75Gqk1m" class="mobile-cta" target="_blank" rel="noopener">💬 LINE で注文</a>
  </div>

  <!-- ══ Full panel: Contact ══ -->
  <main class="full-panel">
    <p class="section-label">contact</p>
    <h2 class="section-title" style="margin-bottom:12px">お問い合わせ</h2>
    <p class="contact-lead">ギフトのご相談・ご注文はLINEまたはInstagramからどうぞ。</p>
    <div class="contact-links">
      <a href="https://lin.ee/75Gqk1m" class="contact-link" target="_blank" rel="noopener">
        <span class="icon">💬</span><span>LINE</span>
      </a>
      <a href="https://www.instagram.com/risutouch" class="contact-link" target="_blank" rel="noopener">
        <span class="icon">📷</span><span>Instagram @risutouch</span>
      </a>
      <a href="mailto:risutouch@gmail.com" class="contact-link">
        <span class="icon">✉️</span><span>risutouch@gmail.com</span>
      </a>
      <a href="tel:090-8370-2871" class="contact-link">
        <span class="icon">📞</span><span>090-8370-2871</span>
      </a>
    </div>

    <!-- Footer info -->
    <div style="margin-top:48px;text-align:center;font-size:0.78rem;color:var(--text-lt);line-height:2.2;">
      <p style="font-family:'Noto Serif JP',serif;color:var(--text-mid);font-size:0.9rem;margin-bottom:4px;">焼き菓子.りすたっち</p>
      <p>山口県長門市油谷新別名1009</p>
      <p>© 2024 焼き菓子.りすたっち</p>
    </div>
  </main>

  <script>
    function toggleMenu() {
      document.getElementById('hamburger').classList.toggle('open');
      document.getElementById('mobile-nav').classList.toggle('open');
      document.getElementById('mobile-overlay').classList.toggle('open');
    }
    function closeMenu() {
      ['hamburger', 'mobile-nav', 'mobile-overlay'].forEach(id =>
        document.getElementById(id)?.classList.remove('open')
      );
    }
  </script>
</body>
</html>
